<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dado Ética Digital</title>
    <style>
        :root {
            --color-rosa: #FFE3EE;
            --color-amarillo: #FFF2B2;
            --color-naranja: #FFD1B3;
            --color-verde: #D4EDDA;
            --color-morado: #E2D9F3;
            --color-azul: #CCE5FF;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
        }

        h1 {
            color: #333;
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
        }

        .game-area {
            width: 100%;
            max-width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scene {
            width: 200px;
            height: 200px;
            perspective: 1000px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(-100px) rotateX(-20deg) rotateY(35deg);
        }

        .cube.idle-spinning {
            animation: rotarPasivo 15s infinite linear;
        }

        @keyframes rotarPasivo {
            0% { transform: translateZ(-100px) rotateX(-20deg) rotateY(0deg); }
            100% { transform: translateZ(-100px) rotateX(-20deg) rotateY(360deg); }
        }

        .cube__face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #111;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
            backface-visibility: hidden;
        }

        .cube__face--1 { background: var(--color-rosa);     transform: rotateY(  0deg) translateZ(100px); }
        .cube__face--2 { background: var(--color-amarillo); transform: rotateY( 90deg) translateZ(100px); }
        .cube__face--3 { background: var(--color-naranja);  transform: rotateY(180deg) translateZ(100px); }
        .cube__face--4 { background: var(--color-verde);    transform: rotateY(-90deg) translateZ(100px); }
        .cube__face--5 { background: var(--color-morado);   transform: rotateX( 90deg) translateZ(100px); }
        .cube__face--6 { background: var(--color-azul);     transform: rotateX(-90deg) translateZ(100px); }

        .action-area {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 30px;
        }

        button.roll-btn {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        button.roll-btn:active { transform: scale(0.98); }
        button.roll-btn:disabled { background: #95a5a6; box-shadow: none; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
            border: 1px solid #ccc;
        }

        .modal-body { 
            font-size: 15px; 
            line-height: 1.5; 
            color: #333; 
            margin-bottom: 20px; 
            text-align: left;
        }
        .modal-timer { 
            font-weight: bold; 
            color: #e74c3c; 
            margin-bottom: 15px; 
        }
        .close-btn { 
            background: #34495e; 
            color: white; 
            padding: 12px 30px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎲 Dados de Ética y Responsabilidad</h1>

    <div class="game-area">
        <div class="scene">
            <div class="cube idle-spinning" id="cube">
                <div class="cube__face cube__face--1">🔑 Decisión</div>
                <div class="cube__face cube__face--2">🔍 Verificación</div>
                <div class="cube__face cube__face--3">🧠 Conexión</div>
                <div class="cube__face cube__face--4">🔒 Privacidad</div>
                <div class="cube__face cube__face--5">⚖️ Veracidad</div>
                <div class="cube__face cube__face--6">🛡️ Protección</div>
            </div>
        </div>
    </div>

    <div class="action-area">
        <button class="roll-btn" id="btnLanzar" onclick="lanzarCubo()">¡Lanzar Cubo!</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-timer" id="modalTimer"></div>
            <button class="close-btn" onclick="cerrarModal()">Entendido</button>
        </div>
    </div>

    <script>
        const retos = {
            1: { titulo: "🔑 Ética en Acción", color: "var(--color-rosa)", texto: "<b>Caso:</b> Sos dev junior. Tu jefe pide recopilar ubicación de usuarios sin permiso. Necesitás el trabajo.<br><br><b>Reto:</b> ¿Qué hacés? Justificá usando autonomía o consecuencias.", tiempo: "⏱️ Tiempo: 30s" },
            2: { titulo: "🔍 Dominio de la Información", color: "var(--color-amarillo)", texto: "<b>Reto:</b> Artículo dice que U pública fue hackeada (80k expedientes). El sitio no tiene autor.<br><br><b>Pregunta:</b> ¿Cómo verificás? Nombrá 3 pasos concretos antes de compartir.", tiempo: "⏱️ Tiempo: 40s" },
            3: { titulo: "🧠 Reto STEAM", color: "var(--color-naranja)", texto: "<b>Clasificá estos casos rápidos:</b><br>1. GPS apagado pero guarda ruta.<br>2. Empleado publica datos en LinkedIn.<br>3. IA rechaza crédito sin explicar.<br>4. U revisa tu correo sin avisar.<br>5. Usan tu foto sin permiso.", tiempo: "💡 Meta: Clasificá bien 4 de 5." },
            4: { titulo: "🔒 Privacidad bajo presión", color: "var(--color-verde)", texto: "<b>Caso:</b> Clínica vende datos a aseguradoras mediante IA. Clientes firmaron consentimiento hace 5 años.<br><br><b>Respondé:</b> ¿Cuál es el acto ético del dev que lo descubre y qué ley de Costa Rica lo regula?", tiempo: "" },
            5: { titulo: "⚖️ Libertad con responsabilidad", color: "var(--color-morado)", texto: "<b>Situación:</b> Influencer destruye reputación de un negocio local con video falso pagado por la competencia.<br><br><b>Pregunta:</b> ¿Quién es responsable éticamente y qué consecuencias deba asumir?", tiempo: "" },
            6: { titulo: "🛡️ Mis Derechos Digitales", color: "var(--color-azul)", texto: "<b>Caso:</b> Borrás tu cuenta de una app. Un mes después te siguen enviando correos con tus gustos. Te dicen que los datos ya son de ellos.<br><br><b>Pregunta:</b> ¿Qué derecho se violó y qué podés exigir legalmente?", tiempo: "" }
        };

        const objetivosCubo = {
            1: { x:   0, y:   0 },
            2: { x:   0, y: -90 },
            3: { x:   0, y: 180 },
            4: { x:   0, y:  90 },
            5: { x: -90, y:   0 },
            6: { x:  90, y:   0 }
        };

        function lanzarCubo() {
            const cubo = document.getElementById('cube');
            const boton = document.getElementById('btnLanzar');
            
            boton.disabled = true;
            cubo.classList.remove('idle-spinning');

            const caraGanadora = Math.floor(Math.random() * 6) + 1;

            // Más realismo
            const vueltas = 5 + Math.floor(Math.random() * 3); // 5 a 7 vueltas
            const target = objetivosCubo[caraGanadora];

            const destinoX = (vueltas * 360) + target.x + (Math.random() * 30 - 15);
            const destinoY = (vueltas * 360) + target.y + (Math.random() * 30 - 15);

            // Animación más natural
            cubo.style.transition = "transform 3.4s cubic-bezier(0.25, 0.1, 0.3, 1)";
            cubo.style.transform = `translateZ(-100px) rotateX(${destinoX}deg) rotateY(${destinoY}deg)`;

            setTimeout(() => {
                mostrarReto(caraGanadora);
                boton.disabled = false;
            }, 3500);
        }

        function mostrarReto(id) {
            const reto = retos[id];
            document.getElementById('modalTitle').innerText = reto.titulo;
            document.getElementById('modalTitle').style.backgroundColor = reto.color;
            document.getElementById('modalBody').innerHTML = reto.texto;
            document.getElementById('modalTimer').innerText = reto.tiempo || "";
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal() {
            const modal = document.getElementById('modal');
            const cubo = document.getElementById('cube');
            
            modal.style.display = 'none';

            cubo.style.transition = "transform 0.8s ease-out";
            cubo.style.transform = "translateZ(-100px) rotateX(-20deg) rotateY(35deg)";
            
            setTimeout(() => {
                cubo.style.transition = "none";
                cubo.classList.add('idle-spinning');
            }, 800);
        }
    </script>
</body>
</html>
