<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dado Ética Digital</title>
    <style>
        :root {
            --color-rosa: #FFE3EE;
            --color-amarillo: #FFF2B2;
            --color-naranja: #FFD1B3;
            --color-verde: #D4EDDA;
            --color-morado: #E2D9F3;
            --color-azul: #CCE5FF;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #333;
            font-size: 24px;
            text-align: center;
            margin: 10px 0;
        }

        .game-area {
            width: 100%;
            max-width: 300px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene {
            width: 200px;
            height: 200px;
            perspective: 1200px;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: translateZ(-100px) rotateX(-20deg) rotateY(35deg);
            transition: transform 0.1s linear;
        }

        .cube__face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 3px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #111;
            border-radius: 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            backface-visibility: hidden;
        }

        .cube__face--1 { background: var(--color-rosa);     transform: rotateY(  0deg) translateZ(100px); }
        .cube__face--2 { background: var(--color-amarillo); transform: rotateY( 90deg) translateZ(100px); }
        .cube__face--3 { background: var(--color-naranja);  transform: rotateY(180deg) translateZ(100px); }
        .cube__face--4 { background: var(--color-verde);    transform: rotateY(-90deg) translateZ(100px); }
        .cube__face--5 { background: var(--color-morado);   transform: rotateX( 90deg) translateZ(100px); }
        .cube__face--6 { background: var(--color-azul);     transform: rotateX(-90deg) translateZ(100px); }

        .action-area {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        button.roll-btn {
            padding: 16px 40px;
            font-size: 18px;
            font-weight: bold;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        button.roll-btn:active { transform: scale(0.98); }
        button.roll-btn:disabled { background: #95a5a6; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: bold;
            padding: 10px 16px;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        .modal-body { font-size: 15px; line-height: 1.6; text-align: left; }
        .close-btn {
            background: #34495e;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🎲 Dados de Ética y Responsabilidad</h1>

    <div class="game-area">
        <div class="scene">
            <div class="cube" id="cube">
                <div class="cube__face cube__face--1">🔑 Decisión</div>
                <div class="cube__face cube__face--2">🔍 Verificación</div>
                <div class="cube__face cube__face--3">🧠 Conexión</div>
                <div class="cube__face cube__face--4">🔒 Privacidad</div>
                <div class="cube__face cube__face--5">⚖️ Veracidad</div>
                <div class="cube__face cube__face--6">🛡️ Protección</div>
            </div>
        </div>
    </div>

    <div class="action-area">
        <button class="roll-btn" id="btnLanzar" onclick="lanzarCubo()">¡Lanzar Cubo!</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle"></div>
            <div class="modal-body" id="modalBody"></div>
            <button class="close-btn" onclick="cerrarModal()">Entendido</button>
        </div>
    </div>

    <script>
        const retos = {
            1: { titulo: "🔑 Ética en Acción", color: "var(--color-rosa)", texto: "<b>Caso:</b> Sos dev junior. Tu jefe pide recopilar ubicación de usuarios sin permiso...<br><br><b>Reto:</b> ¿Qué hacés?" },
            2: { titulo: "🔍 Dominio de la Información", color: "var(--color-amarillo)", texto: "<b>Reto:</b> Artículo dice que U pública fue hackeada...<br><br><b>Pregunta:</b> ¿Cómo verificás?" },
            3: { titulo: "🧠 Reto STEAM", color: "var(--color-naranja)", texto: "<b>Clasificá estos casos rápidos:</b><br>1. GPS apagado...<br>2. Empleado publica datos..." },
            4: { titulo: "🔒 Privacidad bajo presión", color: "var(--color-verde)", texto: "<b>Caso:</b> Clínica vende datos a aseguradoras..." },
            5: { titulo: "⚖️ Libertad con responsabilidad", color: "var(--color-morado)", texto: "<b>Situación:</b> Influencer destruye reputación..." },
            6: { titulo: "🛡️ Mis Derechos Digitales", color: "var(--color-azul)", texto: "<b>Caso:</b> Borrás tu cuenta de una app..." }
        };

        let isRolling = false;

        function getVisibleFace() {
            const cube = document.getElementById('cube');
            const style = window.getComputedStyle(cube);
            const transform = style.transform;

            if (!transform || transform === 'none') return 1;

            // Extraer la matriz de transformación
            const values = transform.replace(/[^0-9eE.,-]/g, '').split(',').map(Number);
            if (values.length < 16) return 1;

            // Calcular qué cara está más hacia la cámara (eje Z)
            const matrix = values;
            const rotX = Math.round(Math.atan2(matrix[6], matrix[10]) * (180 / Math.PI));
            const rotY = Math.round(Math.atan2(-matrix[2], Math.sqrt(matrix[6]*matrix[6] + matrix[10]*matrix[10])) * (180 / Math.PI));

            // Normalizar ángulos
            let normalizedX = ((rotX % 360) + 360) % 360;
            let normalizedY = ((rotY % 360) + 360) % 360;

            // Determinar cara según ángulos
            if (normalizedX > 45 && normalizedX < 135) return 5;      // Arriba
            if (normalizedX > 225 && normalizedX < 315) return 6;     // Abajo
            if (normalizedY > 45 && normalizedY < 135) return 4;      // Izquierda
            if (normalizedY > 225 && normalizedY < 315) return 2;     // Derecha
            if (normalizedY > 135 && normalizedY < 225) return 3;     // Atrás
            return 1; // Frente
        }

        function lanzarCubo() {
            if (isRolling) return;
            isRolling = true;

            const cubo = document.getElementById('cube');
            const boton = document.getElementById('btnLanzar');

            boton.disabled = true;

            // Giros aleatorios realistas
            const vueltas = 6 + Math.floor(Math.random() * 4);
            const extraX = Math.random() * 60 - 30;
            const extraY = Math.random() * 60 - 30;

            const destinoX = vueltas * 360 + extraX;
            const destinoY = vueltas * 360 + extraY;

            cubo.style.transition = "transform 3.8s cubic-bezier(0.25, 0.1, 0.35, 1)";
            cubo.style.transform = `translateZ(-100px) rotateX(${destinoX}deg) rotateY(${destinoY}deg)`;

            // Detectar cara REAL después de la animación
            setTimeout(() => {
                const caraReal = getVisibleFace();
                mostrarReto(caraReal);
                
                boton.disabled = false;
                isRolling = false;
            }, 4000);
        }

        function mostrarReto(id) {
            const reto = retos[id];
            document.getElementById('modalTitle').innerText = reto.titulo;
            document.getElementById('modalTitle').style.backgroundColor = reto.color;
            document.getElementById('modalBody').innerHTML = reto.texto;
            document.getElementById('modal').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal').style.display = 'none';
            
            const cubo = document.getElementById('cube');
            cubo.style.transition = "transform 0.6s ease";
            cubo.style.transform = "translateZ(-100px) rotateX(-20deg) rotateY(35deg)";
        }
    </script>
</body>
</html>
