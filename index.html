<script>
    const retos = { /* ... tu objeto de retos se mantiene igual ... */ };

    // Ángulos corregidos y más confiables
    const objetivosCubo = {
        1: { x:   0, y:   0 },   // Cara 1 (front)
        2: { x:   0, y: -90 },   // Cara 2
        3: { x:   0, y: 180 },   // Cara 3 (back)
        4: { x:   0, y:  90 },   // Cara 4
        5: { x: -90, y:   0 },   // Cara 5 (top)
        6: { x:  90, y:   0 }    // Cara 6 (bottom)
    };

    function lanzarCubo() {
        const cubo = document.getElementById('cube');
        const boton = document.getElementById('btnLanzar');
        
        boton.disabled = true;
        cubo.classList.remove('idle-spinning');

        // Número aleatorio
        const caraGanadora = Math.floor(Math.random() * 6) + 1;

        // ====================== ANIMACIÓN MÁS REALISTA ======================
        const vueltas = 4 + Math.floor(Math.random() * 3); // entre 4 y 6 vueltas completas

        const extraX = (Math.random() * 40 - 20); // pequeño ruido para naturalidad
        const extraY = (Math.random() * 40 - 20);

        const target = objetivosCubo[caraGanadora];

        const destinoX = (vueltas * 360) + target.x + extraX;
        const destinoY = (vueltas * 360) + target.y + extraY;

        // Transición más física
        cubo.style.transition = "transform 3.2s cubic-bezier(0.25, 0.1, 0.25, 1)";
        cubo.style.transform = `translateZ(-100px) rotateX(${destinoX}deg) rotateY(${destinoY}deg)`;

        // Después de la animación
        setTimeout(() => {
            mostrarReto(caraGanadora);
            boton.disabled = false;
        }, 3300);
    }

    function mostrarReto(id) {
        const reto = retos[id];
        document.getElementById('modalTitle').innerText = reto.titulo;
        document.getElementById('modalTitle').style.backgroundColor = reto.color;
        document.getElementById('modalBody').innerHTML = reto.texto;
        document.getElementById('modalTimer').innerText = reto.tiempo || "";
        document.getElementById('modal').style.display = 'flex';
    }

    function cerrarModal() {
        const modal = document.getElementById('modal');
        const cubo = document.getElementById('cube');
        
        modal.style.display = 'none';

        // Reset suave
        cubo.style.transition = "transform 0.6s ease";
        cubo.style.transform = "translateZ(-100px) rotateX(-20deg) rotateY(35deg)";
        
        setTimeout(() => {
            cubo.style.transition = "none";
            cubo.classList.add('idle-spinning');
        }, 650);
    }
</script>
